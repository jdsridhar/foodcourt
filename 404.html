<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Page not found – FoodStreet Digital Food Ordering System.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex">
<title>404 – Page Not Found | FoodStreet</title>
<link rel="icon" href="assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
  .not-found-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #FFF4EC 0%, #F8F9FA 100%);
  }
  .not-found-card {
    max-width: 480px;
    width: 100%;
    text-align: center;
    padding: 3rem 2rem;
  }
  .not-found-code {
    font-size: 7rem;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #FF6B35, #ff8a5c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .not-found-icon {
    font-size: 2.5rem;
    color: var(--color-primary);
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }
</style>
</head>
<body>

<nav class="navbar app-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img data-app-logo src="assets/logos/default-logo.svg" alt="Logo" onerror="this.style.display='none'">
      <span data-app-name>FoodStreet</span>
    </a>
  </div>
</nav>

<div class="not-found-wrapper">
  <div class="card not-found-card shadow-lg border-0">
    <div class="not-found-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <div class="not-found-code">404</div>
    <h2 class="fw-bold mb-2">Page Not Found</h2>
    <p class="text-muted mb-4">
      The page you're looking for doesn't exist or may have moved.<br>
      Let's get you back on track.
    </p>
    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
      <a href="index.html" class="btn btn-primary px-4">
        <i class="bi bi-shop me-2"></i>Browse Stalls
      </a>
      <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
        <i class="bi bi-arrow-left me-2"></i>Go Back
      </a>
    </div>
    <div class="mt-4 pt-3 border-top">
      <small class="text-muted">
        Are you a staff member?
        <a href="manager/login.html" class="text-primary fw-semibold">Manager Login</a> ·
        <a href="admin/login.html" class="text-primary fw-semibold">Admin Login</a>
      </small>
    </div>
  </div>
</div>

<script type="module">
  import { getFoodStreetSettings, applyBranding } from "./js/common.js";
  getFoodStreetSettings().then(applyBranding);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
