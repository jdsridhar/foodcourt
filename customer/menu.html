<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse the menu and order your favourite dishes from this stall on FoodStreet.">
<meta name="theme-color" content="#FF6B35">
<title>Menu - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<nav class="navbar app-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="../index.html">
      <i class="bi bi-arrow-left-circle me-2"></i><span data-app-name>FoodStreet</span>
    </a>
    <a href="cart.html" class="btn btn-outline-primary position-relative cart-icon-btn">
      <i class="bi bi-cart3"></i> Cart
      <span class="badge rounded-pill d-none" data-cart-count>0</span>
    </a>
  </div>
</nav>

<main class="container py-4">
  <h4 class="mb-3" id="stallNameHeading"><i class="bi bi-shop me-2 text-primary"></i>Stall Menu</h4>

  <div class="row g-2 mb-4">
    <div class="col-12 col-md-6">
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
        <input type="text" id="menuSearchInput" class="form-control" placeholder="Search dishes...">
      </div>
    </div>
    <div class="col-12 col-md-4">
      <select id="categoryFilter" class="form-select">
        <option value="">All Categories</option>
      </select>
    </div>
  </div>

  <div class="row g-4" id="menuGrid"></div>
</main>

<!-- Add to cart modal -->
<div class="modal fade" id="addItemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addItemModalTitle">Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Quantity</label>
          <input type="number" class="form-control" id="addItemQty" min="1" max="20" value="1">
        </div>
        <div class="mb-3">
          <label class="form-label">Special Instructions (optional)</label>
          <textarea class="form-control" id="addItemInstructions" rows="2" placeholder="E.g. less spicy, no onions..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-accent" id="addItemConfirmBtn"><i class="bi bi-cart-plus me-1"></i>Add to Cart</button>
      </div>
    </div>
  </div>
</div>

<footer class="app-footer">&copy; 2026 <span data-app-name>FoodStreet</span>. All rights reserved.</footer>

<script type="module">
  import { initCommonLayout, getFoodStreetSettings, applyBranding } from "../js/common.js";
  import { captureTableNumber, initMenuBrowsing } from "../js/customer.js";
  import { updateCartBadge } from "../js/cart.js";
  import { db, COLLECTIONS } from "../js/firebase-config.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getQueryParam, escapeHtml } from "../js/utils.js";

  initCommonLayout();
  updateCartBadge();
  captureTableNumber();
  getFoodStreetSettings().then(applyBranding);

  const stallId = getQueryParam("stallId");
  if (stallId) {
    getDoc(doc(db, COLLECTIONS.STALLS, stallId)).then((snap) => {
      if (snap.exists()) {
        document.getElementById("stallNameHeading").innerHTML =
          `<i class="bi bi-shop me-2 text-primary"></i>${escapeHtml(snap.data().name)}`;
      }
    });
  }

  initMenuBrowsing();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
