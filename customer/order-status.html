<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Track your FoodStreet order in real time. See exactly where your food is in the preparation process.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex">
<title>Order Status - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<nav class="navbar app-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="../index.html">
      <i class="bi bi-arrow-left-circle me-2"></i><span data-app-name>FoodStreet</span>
    </a>
  </div>
</nav>

<main class="container py-4">
  <h4 class="mb-4"><i class="bi bi-receipt-cutoff me-2 text-primary"></i>Track Your Order</h4>
  <div id="orderStatusContainer">
    <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading order status...</p></div>
  </div>
  <a href="../index.html" class="btn btn-outline-primary mt-3"><i class="bi bi-plus-lg me-1"></i>Order More</a>
</main>

<footer class="app-footer">&copy; 2026 <span data-app-name>FoodStreet</span>. All rights reserved.</footer>

<script type="module">
  import { initCommonLayout, getFoodStreetSettings, applyBranding } from "../js/common.js";
  import { trackCheckout, getLastCheckoutId } from "../js/order.js";
  import { getQueryParam } from "../js/utils.js";

  initCommonLayout();
  getFoodStreetSettings().then(applyBranding);

  const checkoutId = getQueryParam("checkoutId") || getLastCheckoutId();
  trackCheckout(checkoutId);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
