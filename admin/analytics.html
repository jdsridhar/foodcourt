<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="System-wide revenue, top-selling items and peak hours analytics for FoodStreet admins.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Analytics - Admin - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shield-lock me-2"></i>Admin Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="stalls.html"><i class="bi bi-shop"></i>Manage Stalls</a>
        <a class="nav-link" href="managers.html"><i class="bi bi-people"></i>Manage Managers</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link active" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <h4 class="mb-4"><i class="bi bi-bar-chart-line me-2 text-primary"></i>System Analytics</h4>

      <div class="row g-3 mb-4">
        <div class="col-12 col-lg-4">
          <div class="stat-card bg-orange"><div class="stat-icon"><i class="bi bi-cash-coin"></i></div>
            <div class="stat-value" id="overallRevenue">₹0.00</div><div>Overall Revenue</div></div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h6 class="mb-3">Revenue by Stall</h6>
            <div id="revenueByStall"></div>
          </div>
        </div>
        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h6 class="mb-3">Top Selling Items</h6>
            <div id="adminTopItems"></div>
          </div>
        </div>
        <div class="col-12">
          <div class="card p-3">
            <h6 class="mb-3">Peak Hours (delivered orders by hour)</h6>
            <div id="peakHoursChart"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initAdminAnalytics } from "../js/admin.js";

  initCommonLayout();
  requireRole("admin", "login.html").then(() => initAdminAnalytics());

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
