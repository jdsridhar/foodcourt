<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="FoodStreet admin dashboard – system-wide revenue, orders and stall overview.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard - Admin - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shield-lock me-2"></i>Admin Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link active" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="stalls.html"><i class="bi bi-shop"></i>Manage Stalls</a>
        <a class="nav-link" href="managers.html"><i class="bi bi-people"></i>Manage Managers</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <h4 class="mb-4"><i class="bi bi-speedometer2 me-2 text-primary"></i>Admin Dashboard</h4>

      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card bg-orange"><div class="stat-icon"><i class="bi bi-cash-coin"></i></div>
            <div class="stat-value" id="totalRevenue">₹0.00</div><div>Total Revenue</div></div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card bg-green"><div class="stat-icon"><i class="bi bi-cash-stack"></i></div>
            <div class="stat-value" id="todaysRevenue">₹0.00</div><div>Today's Revenue</div></div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card bg-blue"><div class="stat-icon"><i class="bi bi-receipt"></i></div>
            <div class="stat-value" id="totalOrders">0</div><div>Total Orders</div></div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card bg-purple"><div class="stat-icon"><i class="bi bi-hourglass-split"></i></div>
            <div class="stat-value" id="activeOrders">0</div><div>Active Orders</div></div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="card p-3 text-center"><div class="fw-bold fs-4" id="deliveredOrders">0</div><div class="small text-muted">Delivered Orders</div></div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card p-3 text-center"><div class="fw-bold fs-4" id="cancelledOrders">0</div><div class="small text-muted">Cancelled Orders</div></div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card p-3 text-center"><div class="fw-bold fs-4 text-success" id="activeStalls">0</div><div class="small text-muted">Active Stalls</div></div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card p-3 text-center"><div class="fw-bold fs-4 text-secondary" id="inactiveStalls">0</div><div class="small text-muted">Inactive Stalls</div></div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12 col-md-4"><a href="stalls.html" class="btn btn-primary w-100 py-3"><i class="bi bi-plus-lg me-1"></i>Manage Stalls</a></div>
        <div class="col-12 col-md-4"><a href="managers.html" class="btn btn-accent w-100 py-3"><i class="bi bi-person-plus me-1"></i>Manage Managers</a></div>
        <div class="col-12 col-md-4"><a href="orders.html" class="btn btn-outline-primary w-100 py-3"><i class="bi bi-receipt-cutoff me-1"></i>View All Orders</a></div>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initAdminDashboard } from "../js/admin.js";

  initCommonLayout();
  requireRole("admin", "login.html").then(() => initAdminDashboard());

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
