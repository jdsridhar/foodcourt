<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Create and manage stall manager accounts on FoodStreet.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Manage Managers - Admin - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shield-lock me-2"></i>Admin Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="stalls.html"><i class="bi bi-shop"></i>Manage Stalls</a>
        <a class="nav-link active" href="managers.html"><i class="bi bi-people"></i>Manage Managers</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-people me-2 text-primary"></i>Manage Managers</h4>
        <button class="btn btn-primary" id="addManagerBtn"><i class="bi bi-person-plus me-1"></i>Create Manager</button>
      </div>

      <div class="card p-3">
        <div class="table-responsive">
          <table class="table align-middle responsive-stack">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Stall</th><th>Status</th><th class="text-end">Actions</th></tr>
            </thead>
            <tbody id="managersTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Create Manager Modal -->
<div class="modal fade" id="managerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create Manager Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="managerForm" class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="managerName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="managerEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Temporary Password</label>
            <input type="password" class="form-control" id="managerPassword" minlength="6" required>
            <div class="form-text">Minimum 6 characters. Manager can change it later from their profile.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Assign Stall</label>
            <select class="form-select" id="managerStallSelect" required></select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="managerSaveBtn"><i class="bi bi-check-lg me-1"></i>Create Account</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initManagerManagement } from "../js/admin.js";

  initCommonLayout();
  requireRole("admin", "login.html").then(() => initManagerManagement());

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
