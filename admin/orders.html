<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="View, search, filter and export all orders across every stall on FoodStreet.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Orders - Admin - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shield-lock me-2"></i>Admin Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="stalls.html"><i class="bi bi-shop"></i>Manage Stalls</a>
        <a class="nav-link" href="managers.html"><i class="bi bi-people"></i>Manage Managers</a>
        <a class="nav-link active" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-receipt me-2 text-primary"></i>All Orders</h4>
        <button class="btn btn-outline-primary" id="exportOrdersBtn"><i class="bi bi-download me-1"></i>Export CSV</button>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-12 col-md-4">
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="orderSearchInput" placeholder="Search order # or stall...">
          </div>
        </div>
        <div class="col-6 col-md-3">
          <select class="form-select" id="orderStatusFilter">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="accepted">Accepted</option>
            <option value="preparing">Preparing</option>
            <option value="ready">Ready</option>
            <option value="delivered">Delivered</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <input type="date" class="form-control" id="orderDateFilter">
        </div>
      </div>

      <div class="card p-3">
        <div class="table-responsive">
          <table class="table align-middle responsive-stack">
            <thead>
              <tr><th>Order</th><th>Stall</th><th>Table</th><th>Amount</th><th>Status</th><th>Customer</th></tr>
            </thead>
            <tbody id="adminOrdersTableBody"></tbody>
          </table>
        </div>
        <nav><ul class="pagination justify-content-center mb-0" id="ordersPagination"></ul></nav>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initAdminOrders } from "../js/admin.js";

  initCommonLayout();
  requireRole("admin", "login.html").then(() => initAdminOrders());

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
