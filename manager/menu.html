<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Add, edit and manage menu items for your stall on FoodStreet.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Menu Management - Manager - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shop me-2"></i>Manager Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link active" href="menu.html"><i class="bi bi-egg-fried"></i>Menu Management</a>
        <a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-egg-fried me-2 text-primary"></i>Menu Management</h4>
        <button class="btn btn-primary" id="addMenuItemBtn"><i class="bi bi-plus-lg me-1"></i>Add Item</button>
      </div>
      <div class="row g-4" id="managerMenuGrid"></div>
    </main>
  </div>
</div>

<!-- Add/Edit Item Modal -->
<div class="modal fade" id="menuItemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="menuItemModalTitle">Add Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="menuItemForm" class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label">Item Name</label>
            <input type="text" class="form-control" id="menuItemName" required>
            <div class="invalid-feedback">Item name is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" class="form-control" id="menuItemCategory" placeholder="E.g. Starters, Main Course">
          </div>
          <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input type="number" step="0.01" min="0.01" class="form-control" id="menuItemPrice" required>
            <div class="invalid-feedback">Enter a valid price.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="menuItemDescription" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Item Image</label>
            <input type="file" class="form-control" id="menuItemImage" accept="image/*">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="menuItemSaveBtn"><i class="bi bi-check-lg me-1"></i>Save Item</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initManagerMenu } from "../js/manager.js";

  initCommonLayout();
  requireRole("manager", "login.html").then((profile) => initManagerMenu(profile.stallId));

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
