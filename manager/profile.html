<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Update your stall's profile details and change your password on FoodStreet.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Profile - Manager - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shop me-2"></i>Manager Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link" href="menu.html"><i class="bi bi-egg-fried"></i>Menu Management</a>
        <a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link active" href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <h4 class="mb-4"><i class="bi bi-person-circle me-2 text-primary"></i>My Profile</h4>

      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h6 class="mb-3">Stall Details</h6>
            <form id="stallProfileForm" class="needs-validation" novalidate>
              <div class="mb-3 text-center">
                <img id="stallLogoPreview" src="../assets/images/placeholder-food.svg" class="rounded-circle mb-2" width="90" height="90" style="object-fit:cover;">
                <input type="file" class="form-control" id="stallLogoInput" accept="image/*">
              </div>
              <div class="mb-3">
                <label class="form-label">Stall Name</label>
                <input type="text" class="form-control" id="stallNameInput" required>
                <div class="invalid-feedback">Stall name is required.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="stallDescriptionInput" rows="3"></textarea>
              </div>
              <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h6 class="mb-3">Change Password</h6>
            <form id="changePasswordForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-control" id="currentPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" minlength="6" required>
                <div class="invalid-feedback">New password must be at least 6 characters.</div>
              </div>
              <button type="submit" class="btn btn-outline-primary"><i class="bi bi-key me-1"></i>Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout, changePassword } from "../js/auth.js";
  import { loadStallProfile, saveStallProfile } from "../js/manager.js";
  import { isRequired, showToast, showLoader } from "../js/utils.js";

  initCommonLayout();

  let currentStallId = null;

  requireRole("manager", "login.html").then(async (profile) => {
    currentStallId = profile.stallId;
    const stall = await loadStallProfile(currentStallId);
    if (stall) {
      document.getElementById("stallNameInput").value = stall.name || "";
      document.getElementById("stallDescriptionInput").value = stall.description || "";
      if (stall.logoUrl) document.getElementById("stallLogoPreview").src = stall.logoUrl;
    }
  });

  document.getElementById("stallLogoInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) document.getElementById("stallLogoPreview").src = URL.createObjectURL(file);
  });

  const stallForm = document.getElementById("stallProfileForm");
  stallForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("stallNameInput").value.trim();
    const description = document.getElementById("stallDescriptionInput").value.trim();
    const logoFile = document.getElementById("stallLogoInput").files[0];

    if (!isRequired(name)) {
      stallForm.classList.add("was-validated");
      return;
    }
    showLoader(true);
    try {
      await saveStallProfile(currentStallId, { name, description, logoFile });
      showToast("Stall profile updated.", "success");
    } catch (err) {
      showToast(err.message || "Failed to update profile.", "danger");
    } finally {
      showLoader(false);
    }
  });

  const passwordForm = document.getElementById("changePasswordForm");
  passwordForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const current = document.getElementById("currentPassword").value;
    const next = document.getElementById("newPassword").value;

    if (!isRequired(current) || next.length < 6) {
      passwordForm.classList.add("was-validated");
      return;
    }
    showLoader(true);
    try {
      await changePassword(current, next);
      showToast("Password updated successfully.", "success");
      passwordForm.reset();
    } catch (err) {
      showToast(err.message || "Failed to update password.", "danger");
    } finally {
      showLoader(false);
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
