<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Manage incoming orders in real time for your stall on FoodStreet.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Orders - Manager - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shop me-2"></i>Manager Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link active" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link" href="menu.html"><i class="bi bi-egg-fried"></i>Menu Management</a>
        <a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <h4 class="mb-4"><i class="bi bi-receipt me-2 text-primary"></i>Order Management</h4>

      <div class="row g-2 mb-3">
        <div class="col-12 col-md-4">
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="orderSearchInput" placeholder="Search order # or table...">
          </div>
        </div>
        <div class="col-6 col-md-3">
          <select class="form-select" id="orderStatusFilter">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="accepted">Accepted</option>
            <option value="preparing">Preparing</option>
            <option value="ready">Ready</option>
            <option value="delivered">Delivered</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <input type="date" class="form-control" id="orderDateFilter">
        </div>
      </div>

      <div class="card p-3">
        <div class="table-responsive">
          <table class="table align-middle responsive-stack">
            <thead>
              <tr>
                <th>Order</th>
                <th>Table</th>
                <th>Items</th>
                <th>Amount</th>
                <th>Status</th>
                <th class="text-end">Action</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody"></tbody>
          </table>
        </div>
        <nav><ul class="pagination justify-content-center mb-0" id="ordersPagination"></ul></nav>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initManagerOrders } from "../js/manager.js";

  initCommonLayout();
  requireRole("manager", "login.html").then((profile) => initManagerOrders(profile.stallId));

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
