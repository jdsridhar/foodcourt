<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sales analytics and top-selling items for your FoodStreet stall.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Analytics - Manager - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
      <h5 class="mb-4 text-primary"><i class="bi bi-shop me-2"></i>Manager Panel</h5>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a class="nav-link" href="menu.html"><i class="bi bi-egg-fried"></i>Menu Management</a>
        <a class="nav-link active" href="analytics.html"><i class="bi bi-bar-chart-line"></i>Analytics</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 py-4">
      <h4 class="mb-4"><i class="bi bi-bar-chart-line me-2 text-primary"></i>Analytics</h4>

      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-4">
          <div class="stat-card bg-orange">
            <div class="stat-icon"><i class="bi bi-calendar-day"></i></div>
            <div class="stat-value" id="analyticsDailySales">₹0.00</div>
            <div>Daily Sales</div>
          </div>
        </div>
        <div class="col-6 col-lg-4">
          <div class="stat-card bg-green">
            <div class="stat-icon"><i class="bi bi-calendar-week"></i></div>
            <div class="stat-value" id="analyticsWeeklySales">₹0.00</div>
            <div>Weekly Sales</div>
          </div>
        </div>
        <div class="col-12 col-lg-4">
          <div class="stat-card bg-blue">
            <div class="stat-icon"><i class="bi bi-calendar-month"></i></div>
            <div class="stat-value" id="analyticsMonthlySales">₹0.00</div>
            <div>Monthly Sales</div>
          </div>
        </div>
      </div>

      <div class="card p-3">
        <h6 class="mb-3">Top Selling Items</h6>
        <div id="analyticsTopItems"></div>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { requireRole, logout } from "../js/auth.js";
  import { initManagerAnalytics } from "../js/manager.js";

  initCommonLayout();
  requireRole("manager", "login.html").then((profile) => initManagerAnalytics(profile.stallId));

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    logout("login.html");
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
