<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Stall manager login for FoodStreet – manage your orders and menu.">
<meta name="theme-color" content="#FF6B35">
<meta name="robots" content="noindex, nofollow">
<title>Manager Login - FoodStreet</title>
<link rel="icon" href="../assets/icons/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/responsive.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="card auth-card">
    <div class="text-center mb-4">
      <i class="bi bi-shop display-4 text-primary"></i>
      <h4 class="mt-2">Stall Manager Login</h4>
      <p class="text-muted small">Manage your stall's orders and menu</p>
    </div>
    <form id="loginForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
        <div class="invalid-feedback">Password is required.</div>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        <i class="bi bi-box-arrow-in-right me-1"></i>Login
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="../index.html" class="small text-muted"><i class="bi bi-arrow-left me-1"></i>Back to customer site</a>
    </div>
  </div>
</div>

<script type="module">
  import { initCommonLayout } from "../js/common.js";
  import { loginWithEmailPassword } from "../js/auth.js";
  import { isValidEmail, isRequired, showToast, showLoader } from "../js/utils.js";

  initCommonLayout();

  const form = document.getElementById("loginForm");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!isValidEmail(email) || !isRequired(password)) {
      form.classList.add("was-validated");
      return;
    }

    showLoader(true);
    try {
      const profile = await loginWithEmailPassword(email, password);
      if (profile.role !== "manager") throw new Error("This account is not a manager account.");
      window.location.href = "dashboard.html";
    } catch (err) {
      console.error(err);
      showToast(err.message || "Login failed. Check your credentials.", "danger");
    } finally {
      showLoader(false);
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
